<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Оплата</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 50px;
            background: #667eea;
        }
        .container {
            background: white;
            max-width: 400px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 20px;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Оплата</h2>
        <input type="number" id="amount" placeholder="Введите сумму">
        
        <button onclick="sendAmount()">💰 Отправить сумму</button>
        <button onclick="sendDone()" style="background:#2196F3;">✅ Подтвердить оплату</button>
        
        <div id="result"></div>
    </div>

    <script>
        function sendAmount() {
            const amount = document.getElementById('amount').value;
            
            if (!amount || amount <= 0) {
                document.getElementById('result').innerHTML = '<p style="color:red">Введите сумму</p>';
                return;
            }
            
            window.location.href = `myapp://payment?amount=${amount}`;
            document.getElementById('result').innerHTML = `<p style="color:green">💰 Сумма ${amount} ₽ отправлена!</p>`;
        }
        
        function sendDone() {
            window.location.href = "myapp://payment?done";
            document.getElementById('result').innerHTML = `<p style="color:green">✅ Оплата подтверждена!</p>`;
        }
    </script>
</body>
</html>
